<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting…</title>
  <meta http-equiv="refresh" content="0; url=/" />
  <style>
    html, body { height: 100%; margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:#0f0f23; color:#fff; }
    .wrap { display: grid; place-items: center; height: 100%; text-align: center; padding: 2rem; }
    a { color: #aab1ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div>
      <h1>Redirecting…</h1>
      <p>If you’re not redirected automatically, <a href="/">click here</a>.</p>
      <script>
        (function() {
          try {
            // Prefer JS redirect for better SPA-like behavior
            var dest = '/';
            if (location && location.origin) dest = location.origin + '/';
            window.location.replace(dest);
          } catch (e) {
            // meta refresh above is the fallback
          }
        })();
      </script>
    </div>
  </div>
</body>
</html>
